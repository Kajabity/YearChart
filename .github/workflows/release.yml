name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build, for example 0.5.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      Configuration: Release

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Resolve release version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}"
        }

        if ($version -notmatch '^\d+\.\d+\.\d+$') {
          throw "Release version '$version' must be in X.Y.Z format."
        }

        "ReleaseVersion=$version" >> $env:GITHUB_ENV

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
        cache: true
        cache-dependency-path: |
          YearChart/YearChart.csproj
          YearChart.WiX/YearChart.WiX.wixproj

    - name: Restore
      run: dotnet restore YearChart.sln

    - name: Build installer
      run: dotnet build YearChart.sln --configuration $env:Configuration --no-restore /p:Version=$env:ReleaseVersion /p:YearChartReleaseVersion=$env:ReleaseVersion

    - name: Locate installer
      id: installer
      shell: pwsh
      run: |
        $installer = Get-ChildItem -Path YearChart.WiX/bin -Recurse -Filter *.msi | Select-Object -First 1

        if (-not $installer) {
          throw "Release build did not produce a Windows installer."
        }

        "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT

    - name: Upload installer artifact
      uses: actions/upload-artifact@v7
      with:
        name: YearChart-installer-${{ env.ReleaseVersion }}
        path: ${{ steps.installer.outputs.path }}
        if-no-files-found: error

    - name: Create GitHub release
      if: github.event_name == 'push'
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release create $env:ReleaseVersion "${{ steps.installer.outputs.path }}" --title "YearChart $env:ReleaseVersion" --notes "YearChart $env:ReleaseVersion" --verify-tag
