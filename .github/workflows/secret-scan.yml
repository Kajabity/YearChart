name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    env:
      GITLEAKS_VERSION: 8.30.1

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install gitleaks
      run: |
        curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        tar -xzf gitleaks.tar.gz gitleaks
        sudo install gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Run gitleaks
      id: gitleaks
      continue-on-error: true
      run: |
        gitleaks git --redact --report-format json --report-path gitleaks-report.json --verbose

    - name: Upload gitleaks report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: gitleaks-report
        path: gitleaks-report.json
        if-no-files-found: warn

    - name: Fail on detected secrets
      if: steps.gitleaks.outcome == 'failure'
      run: |
        echo "Potential secrets were detected. Review gitleaks-report.json for details."
        exit 1
