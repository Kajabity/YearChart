name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      Configuration: Release
      BuildVersion: 0.0.0-dev

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Resolve build version
      if: github.ref_type == 'tag'
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}"

        if ($version -notmatch '^\d+\.\d+\.\d+$') {
          throw "Release tag '$version' must be in X.Y.Z format."
        }

        "BuildVersion=$version" >> $env:GITHUB_ENV

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: |
          YearChart/YearChart.csproj
          YearChart.WiX/YearChart.WiX.wixproj

    - name: Restore
      run: dotnet restore YearChart.sln

    - name: Build
      run: dotnet build YearChart.sln --configuration $env:Configuration --no-restore /p:Version=$env:BuildVersion

    - name: Test
      shell: pwsh
      run: |
        $testProjects = Get-ChildItem -Recurse -Include *Tests.csproj,*Test.csproj | Select-Object -ExpandProperty FullName

        if (-not $testProjects) {
          Write-Host "No test projects found. Skipping tests."
          exit 0
        }

        foreach ($project in $testProjects) {
          dotnet test $project --configuration $env:Configuration --no-build --logger "trx"
        }

    - name: Upload application artifact
      uses: actions/upload-artifact@v7
      with:
        name: YearChart-app
        path: |
          YearChart/bin/Release/net10.0-windows/**
        if-no-files-found: error

    - name: Upload installer artifact
      uses: actions/upload-artifact@v7
      with:
        name: YearChart-installer
        path: |
          YearChart.WiX/bin/x86/Release/*.msi
          YearChart.WiX/bin/x86/Release/*.wixpdb
        if-no-files-found: error
